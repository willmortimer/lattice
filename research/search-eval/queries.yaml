# Stub query set for hybrid retrieval evaluation.
version: 1
queries:
  # Single-token title match (FTS-friendly).
  - id: exact-title
    text: Architecture
    class: exact-identifier
    relevant:
      - Architecture.md
  # Multi-term AND of words present in Architecture.md.
  - id: multi-term-and
    text: plugins filesystem grants
    class: exact-identifier
    relevant:
      - Architecture.md
  # Quoted phrase clause.
  - id: phrase-rrf
    text: '"reciprocal rank fusion"'
    class: architecture-decision
    relevant:
      - Architecture.md
  # Long paraphrase: often weak under strict FTS AND; hybrid still runs.
  - id: paraphrase-capabilities
    text: how plugins receive filesystem permissions
    class: paraphrase
    relevant:
      - Architecture.md
  - id: negative-ambiguous
    text: unrelated cooking recipes
    class: negative
    relevant: []
