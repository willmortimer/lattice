# Deploy the Astro marketing/docs site to Cloudflare Pages.
# Manual local path stays: nix run .#site-deploy (direnv/sops or wrangler login).
# This workflow is tag-only so day-to-day pushes do not burn Actions minutes.

name: Site deploy (Cloudflare Pages)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: site-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm --filter @lattice/site build

      - name: Deploy to Cloudflare Pages
        working-directory: site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Missing GitHub secret CLOUDFLARE_API_TOKEN (Pages Edit)." >&2
            exit 1
          fi
          npx --yes wrangler@4 pages deploy \
            --project-name=lattice \
            --commit-dirty=true
