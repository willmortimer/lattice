name: Desktop perf (browser)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: desktop-perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser-perf:
    name: Browser perf harness
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @lattice/desktop exec playwright install --with-deps chromium

      - name: Run browser perf harness
        continue-on-error: true
        run: pnpm --filter @lattice/desktop test:perf
