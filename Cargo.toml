[workspace]
resolver = "2"
members = [
    "crates/lattice-core",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.85"

[workspace.dependencies]
lattice-core = { path = "crates/lattice-core" }
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
thiserror = "2"
uuid = { version = "1", features = ["v7", "serde"] }
walkdir = "2"
