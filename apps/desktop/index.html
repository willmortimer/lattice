<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lattice</title>
    <style>
      /* Fallback ground before mirror / bundle (Lattice Slate). */
      html {
        background: #0a0d13;
      }
    </style>
    <script>
      /* Synchronous first paint from the last applied theme (no flash).
         Auto mode prefers the variant matching prefers-color-scheme. */
      (function () {
        try {
          var raw = localStorage.getItem("lattice.theme.mirror");
          if (!raw) return;
          var m = JSON.parse(raw);
          if (!m || !m.background) return;
          var system =
            window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          var entry = m;
          if (m.mode === "auto" && m.byAppearance && m.byAppearance[system]) {
            entry = m.byAppearance[system];
          }
          if (!entry || !entry.background) return;
          document.documentElement.style.background = entry.background;
          if (entry.appearance === "light" || entry.appearance === "dark") {
            document.documentElement.style.colorScheme = entry.appearance;
          }
          if (entry.vars && typeof entry.vars === "object") {
            var css = ":root{";
            for (var k in entry.vars) {
              if (Object.prototype.hasOwnProperty.call(entry.vars, k)) {
                css += k + ":" + entry.vars[k] + ";";
              }
            }
            css += "}";
            var s = document.createElement("style");
            s.setAttribute("data-lattice-theme-mirror", "");
            s.textContent = css;
            document.head.appendChild(s);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="portal"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
