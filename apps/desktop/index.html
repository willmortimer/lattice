<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lattice</title>
    <style>
      /* Fallback ground before mirror / bundle (Lattice Slate). */
      html {
        background: #0a0d13;
      }
    </style>
    <script>
      /* Synchronous first paint from the last applied theme (no flash). */
      (function () {
        try {
          var raw = localStorage.getItem("lattice.theme.mirror");
          if (!raw) return;
          var m = JSON.parse(raw);
          if (!m || !m.background) return;
          document.documentElement.style.background = m.background;
          if (m.appearance === "light" || m.appearance === "dark") {
            document.documentElement.style.colorScheme = m.appearance;
          }
          if (m.vars && typeof m.vars === "object") {
            var css = ":root{";
            for (var k in m.vars) {
              if (Object.prototype.hasOwnProperty.call(m.vars, k)) {
                css += k + ":" + m.vars[k] + ";";
              }
            }
            css += "}";
            var s = document.createElement("style");
            s.setAttribute("data-lattice-theme-mirror", "");
            s.textContent = css;
            document.head.appendChild(s);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="portal"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
