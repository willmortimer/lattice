# Lattice Meadow — light theme, fresh green-tinted whites with a leaf accent.

name: Lattice Meadow
id: lattice-meadow
appearance: light

palette:
  ground: "#f3f8f1"
  ground_raise: "#e9f2e6"
  panel: "#ffffff"
  slate: "#667f64"
  text: "#17251a"
  text_soft: "#3c5242"
  muted: "#66806c"
  faint: "#8ba28f"
  accent: "#2e7d32"
  accent_bright: "#1f6023"
  accent_deep: "#164a1a"
  danger: "#b3392b"
  ink_shadow: "#0a0d13"
  on_accent: "#f2fff3"

roles:
  bg: $ground
  bg_raise: $ground_raise
  panel: $panel
  slate: $slate
  text: $text
  text_soft: $text_soft
  muted: $muted
  faint: $faint
  accent: $accent
  accent_bright: $accent_bright
  accent_deep: $accent_deep
  danger: $danger
  shadow: $ink_shadow

fonts:
  display: '"Fraunces Variable", "Fraunces", Georgia, serif'
  ui: '"Space Grotesk Variable", "Space Grotesk", system-ui, sans-serif'
  mono: '"JetBrains Mono Variable", "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace'

shape:
  radius: 9px
  radius_sm: 6px
  radius_lg: 14px
  grid: 34px
  titlebar: 38px
  max_width: 1140px
