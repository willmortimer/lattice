# Lattice Ember — dark theme, warm charcoal ground with ember orange accent.

name: Lattice Ember
id: lattice-ember
appearance: dark

palette:
  ground: "#120b09"
  ground_raise: "#1a100d"
  panel: "#221512"
  slate: "#b39a90"
  text: "#f6ece8"
  text_soft: "#d8c5be"
  muted: "#a08a82"
  faint: "#6f5d56"
  accent: "#ff6b4a"
  accent_bright: "#ffa38c"
  accent_deep: "#cc4526"
  danger: "#ff7b9d"
  ink_shadow: "#000000"
  on_accent: "#2b0d04"

roles:
  bg: $ground
  bg_raise: $ground_raise
  panel: $panel
  slate: $slate
  text: $text
  text_soft: $text_soft
  muted: $muted
  faint: $faint
  accent: $accent
  accent_bright: $accent_bright
  accent_deep: $accent_deep
  danger: $danger
  shadow: $ink_shadow

fonts:
  display: '"Fraunces Variable", "Fraunces", Georgia, serif'
  ui: '"Space Grotesk Variable", "Space Grotesk", system-ui, sans-serif'
  mono: '"JetBrains Mono Variable", "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace'

shape:
  radius: 9px
  radius_sm: 6px
  radius_lg: 14px
  grid: 34px
  titlebar: 38px
  max_width: 1140px
