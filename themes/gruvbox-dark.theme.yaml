# Gruvbox Dark — terminal-inspired adaptation of the MIT-licensed palette.
# Warm retro neutrals become the shell structure; the orange signal stays
# sparse while the full ANSI family remains available to xterm.

name: Gruvbox Dark
id: gruvbox-dark
appearance: dark

palette:
  bg: "#282828"
  bg_raise: "#32302f"
  surface: "#3c3836"
  overlay: "#504945"
  text: "#ebdbb2"
  text_soft: "#d5c4a1"
  muted: "#a89984"
  faint: "#928374"
  orange: "#fe8019"
  orange_bright: "#fabd2f"
  orange_deep: "#d65d0e"
  red: "#cc241d"
  green: "#98971a"
  yellow: "#d79921"
  blue: "#458588"
  magenta: "#b16286"
  cyan: "#689d6a"
  white: "#a89984"
  bright_red: "#fb4934"
  bright_green: "#b8bb26"
  bright_yellow: "#fabd2f"
  bright_blue: "#83a598"
  bright_magenta: "#d3869b"
  bright_cyan: "#8ec07c"
  ink: "#1d2021"
  on_accent: "#241600"

roles:
  bg: $bg
  bg_raise: $bg_raise
  panel: $surface
  slate: $muted
  text: $text
  text_soft: $text_soft
  muted: $muted
  faint: $faint
  accent: $orange
  accent_bright: $orange_bright
  accent_deep: $orange_deep
  danger: $bright_red
  shadow: $ink

terminal:
  black: $bg
  red: $red
  green: $green
  yellow: $yellow
  blue: $blue
  magenta: $magenta
  cyan: $cyan
  white: $white
  bright_black: $faint
  bright_red: $bright_red
  bright_green: $bright_green
  bright_yellow: $bright_yellow
  bright_blue: $bright_blue
  bright_magenta: $bright_magenta
  bright_cyan: $bright_cyan
  bright_white: $text
  cursor: $text
  cursor_text: $bg
  selection: $overlay

fonts:
  display: '"Fraunces Variable", "Fraunces", Georgia, serif'
  ui: '"Space Grotesk Variable", "Space Grotesk", system-ui, sans-serif'
  mono: '"JetBrains Mono Variable", "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace'

shape:
  radius: 8px
  radius_sm: 5px
  radius_lg: 13px
  grid: 34px
  titlebar: 38px
  max_width: 1140px
