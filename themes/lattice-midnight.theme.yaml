# Lattice Midnight — dark theme, deep indigo night with an electric blue accent.

name: Lattice Midnight
id: lattice-midnight
appearance: dark

palette:
  ground: "#060913"
  ground_raise: "#0a0f1f"
  panel: "#101730"
  slate: "#8a95c4"
  text: "#e9edfa"
  text_soft: "#bcc5e0"
  muted: "#8791b4"
  faint: "#59628a"
  accent: "#5aa9ff"
  accent_bright: "#9cccff"
  accent_deep: "#2d7dd6"
  danger: "#ff8ca0"
  ink_shadow: "#000000"
  on_accent: "#06121f"

roles:
  bg: $ground
  bg_raise: $ground_raise
  panel: $panel
  slate: $slate
  text: $text
  text_soft: $text_soft
  muted: $muted
  faint: $faint
  accent: $accent
  accent_bright: $accent_bright
  accent_deep: $accent_deep
  danger: $danger
  shadow: $ink_shadow

fonts:
  display: '"Fraunces Variable", "Fraunces", Georgia, serif'
  ui: '"Space Grotesk Variable", "Space Grotesk", system-ui, sans-serif'
  mono: '"JetBrains Mono Variable", "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace'

shape:
  radius: 9px
  radius_sm: 6px
  radius_lg: 14px
  grid: 34px
  titlebar: 38px
  max_width: 1140px
