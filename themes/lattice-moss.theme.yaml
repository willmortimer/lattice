# Lattice Moss — dark theme, forest-floor greens with a mossy accent.

name: Lattice Moss
id: lattice-moss
appearance: dark

palette:
  ground: "#0b120c"
  ground_raise: "#101a12"
  panel: "#16241a"
  slate: "#93ab97"
  text: "#eaf4ec"
  text_soft: "#c2d4c6"
  muted: "#8aa290"
  faint: "#5c7263"
  accent: "#8fd460"
  accent_bright: "#c0eda0"
  accent_deep: "#5aa32f"
  danger: "#ff9d8a"
  ink_shadow: "#000000"
  on_accent: "#10230a"

roles:
  bg: $ground
  bg_raise: $ground_raise
  panel: $panel
  slate: $slate
  text: $text
  text_soft: $text_soft
  muted: $muted
  faint: $faint
  accent: $accent
  accent_bright: $accent_bright
  accent_deep: $accent_deep
  danger: $danger
  shadow: $ink_shadow

fonts:
  display: '"Fraunces Variable", "Fraunces", Georgia, serif'
  ui: '"Space Grotesk Variable", "Space Grotesk", system-ui, sans-serif'
  mono: '"JetBrains Mono Variable", "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace'

shape:
  radius: 9px
  radius_sm: 6px
  radius_lg: 14px
  grid: 34px
  titlebar: 38px
  max_width: 1140px
